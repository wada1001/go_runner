<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Ebiten Game</title>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script src="./js/wasm_exec.js"></script>
  <script>
    const go = new Go();

    WebAssembly.instantiateStreaming(fetch("js/pong/game.wasm"), go.importObject)
        .then((result) => {
        go.run(result.instance);
        });
  </script>
</body>
</html>
